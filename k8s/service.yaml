apiVersion: v1
kind: Service
metadata:
  name: petstore
  namespace: petstore
  labels:
    app.kubernetes.io/name: petstore
    app.kubernetes.io/instance: petstore
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: petstore
    app.kubernetes.io/instance: petstore