version: '3.8'

services:
  petstore:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
    volumes:
      # For development, mount source code for hot reloading
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  petstore-prod:
    build: .
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    profiles:
      - prod